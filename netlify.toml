[build]
  base = "frontend"
  publish = "frontend"
  command = "echo 'Frontend ready for deployment'"

[[redirects]]
  from = "/api/*"
  to = "https://skillswap-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://skillswap-backend.onrender.com/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
