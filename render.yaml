services:
  # Backend Service
  - type: web
    name: skillswap-backend
    env: python
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "cd backend && gunicorn skillswap.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillswap-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://skillswap-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: skillswap-db
    databaseName: skillswap
    user: skillswap
    region: oregon
